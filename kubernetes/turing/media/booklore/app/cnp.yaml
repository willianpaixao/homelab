---
apiVersion: cilium.io/v2
kind: CiliumNetworkPolicy
metadata:
  name: booklore-cross-cluster
  namespace: media
spec:
  endpointSelector:
    matchLabels:
      app.kubernetes.io/name: booklore
  ingress:
    - fromEndpoints:
        - matchLabels:
            io.cilium.k8s.policy.cluster: raspberry
            io.kubernetes.pod.namespace: network
            app.kubernetes.io/name: ingress-nginx
      toPorts:
        - ports:
            - port: "6060"
              protocol: TCP
    - fromEntities:
        - ingress
      toPorts:
        - ports:
            - port: "6060"
              protocol: TCP
    - fromEndpoints:
        - matchLabels:
            io.cilium.k8s.policy.cluster: raspberry
            io.kubernetes.pod.namespace: kube-system
            k8s-app: cilium
      toPorts:
        - ports:
            - port: "6060"
              protocol: TCP
