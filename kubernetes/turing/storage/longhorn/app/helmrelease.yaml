---
# yaml-language-server: $schema=https://raw.githubusercontent.com/fluxcd-community/flux2-schemas/main/helmrelease-helm-v2.json
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: longhorn
  namespace: &namespace storage
spec:
  interval: 1h
  chart:
    spec:
      chart: longhorn
      version: 1.11.2
      sourceRef:
        kind: HelmRepository
        name: longhorn
        namespace: flux-system
  maxHistory: 3
  install:
    crds: CreateReplace
    remediation:
      retries: 3
  upgrade:
    cleanupOnFail: true
    crds: CreateReplace
    remediation:
      strategy: rollback
      retries: 3
  values:
    persistence:
      defaultClassReplicaCount: 2
      defaultNodeSelector:
        enable: true
        selector: "nvme"
    metrics:
      serviceMonitor:
        enabled: true
    longhornUI:
      replicas: 1
    ingress:
      enabled: false
    defaultBackupStore:
      backupTarget: "s3://longhorn-uncaring@us-east-005/"
      backupTargetCredentialSecret: "longhorn-backup"
    defaultSettings:
      defaultDataPath: "/mnt/nvme/longhorn"
