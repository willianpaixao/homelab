---
# yaml-language-server: $schema=https://raw.githubusercontent.com/fluxcd-community/flux2-schemas/main/helmrelease-helm-v2.json
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: &app longhorn
  namespace: &namespace storage
spec:
  interval: 1h
  chart:
    spec:
      chart: longhorn
      version: 1.11.2
      sourceRef:
        kind: HelmRepository
        name: longhorn
        namespace: flux-system
  maxHistory: 3
  install:
    crds: CreateReplace
    remediation:
      retries: 3
  upgrade:
    cleanupOnFail: true
    crds: CreateReplace
    remediation:
      strategy: rollback
      retries: 3
  values:
    persistence:
      defaultClass: true
      defaultClassReplicaCount: 1
      defaultNodeSelector:
        enable: true
        selector: "ssd"
    metrics:
      serviceMonitor:
        enabled: true
        metricRelabelings:
          - sourceLabels: [__name__]
            action: drop
            regex: "longhorn_rest_client_rate_limiter_latency_seconds_bucket"
    ingress:
      enabled: false
    defaultBackupStore:
      backupTarget: "s3://longhorn-uncaring@us-east-005/"
      backupTargetCredentialSecret: "longhorn-backup"
    longhornDriver:
      nodeSelector:
        disktype: ssd
    longhornManager:
      nodeSelector:
        disktype: ssd
    longhornUI:
      replicas: 1
      nodeSelector:
        disktype: ssd
