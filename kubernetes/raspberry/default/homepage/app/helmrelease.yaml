---
# yaml-language-server: $schema=https://raw.githubusercontent.com/bjw-s-labs/helm-charts/main/charts/other/app-template/schemas/helmrelease-helm-v2.schema.json
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: &app homepage
  namespace: &namespace default
spec:
  interval: 1h
  timeout: 15m
  chartRef:
    kind: OCIRepository
    name: app-template
    namespace: flux-system
  install:
    remediation:
      retries: 3
  upgrade:
    cleanupOnFail: true
    remediation:
      strategy: rollback
      retries: 3
  values:
    controllers:
      homepage:
        strategy: RollingUpdate
        annotations:
          reloader.stakater.com/auto: "true"
        serviceAccount:
          identifier: homepage
        containers:
          app:
            image:
              repository: ghcr.io/gethomepage/homepage
              tag: v1.12.1@sha256:9627769818fbfb14147d3e633e57cef9c27c0c5f07585f5a1d6c3d3425b3b33c
              pullPolicy: IfNotPresent
            env:
              HOMEPAGE_ALLOWED_HOSTS: ${SECRET_DOMAIN}
              TZ: ${TIMEZONE}
            envFrom:
              - secretRef:
                  name: homepage-secret
            resources:
              requests:
                cpu: 100m
                memory: 128Mi
              limits:
                cpu: 500m
                memory: 256Mi
            probes:
              startup:
                enabled: true
                spec:
                  failureThreshold: 30
                  periodSeconds: 5
              liveness:
                enabled: true
              readiness:
                enabled: true
            securityContext:
              allowPrivilegeEscalation: false
              capabilities:
                drop:
                  - ALL
              readOnlyRootFilesystem: true
              runAsGroup: 1000
              runAsNonRoot: true
              runAsUser: 1000
    serviceAccount:
      homepage: {}
    service:
      homepage:
        controller: homepage
        ports:
          http:
            port: 3000
    persistence:
      config:
        enabled: true
        type: configMap
        name: homepage-config
        globalMounts:
          - path: /app/config
      clusters:
        enabled: true
        type: secret
        name: homepage-turing-kubeconfig
        globalMounts:
          - path: /app/config/clusters/turing
      logs:
        enabled: true
        type: emptyDir
        globalMounts:
          - path: /app/config/logs
    ingress:
      homepage:
        enabled: true
        className: internal
        hosts:
          - host: &host ${SECRET_DOMAIN}
            paths:
              - path: /
                service:
                  identifier: homepage
                  port: http
        tls:
          - hosts:
              - *host
    defaultPodOptions:
      labels:
        app: homepage
        environment: production
        owner: willianpaixao
      nodeSelector:
        kubernetes.io/hostname: logos
      securityContext:
        fsGroup: 1000
        fsGroupChangePolicy: "OnRootMismatch"
