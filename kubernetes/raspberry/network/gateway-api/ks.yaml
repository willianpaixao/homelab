---
# yaml-language-server: $schema=https://raw.githubusercontent.com/fluxcd-community/flux2-schemas/main/kustomization-kustomize-v1.json
apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata:
  name: &app gateway-api-crds
  namespace: flux-system
spec:
  commonMetadata:
    labels:
      app.kubernetes.io/name: *app
  path: ./config/crd/standard
  # Drop TLSRoute: Cilium 1.19.x registers a field indexer against
  # gateway.networking.k8s.io/v1alpha2 TLSRoute, but the Gateway API v1.5
  # standard channel only serves v1 — cilium-operator crashloops.
  # See https://github.com/cilium/cilium/issues/44920. TLSRoute is unused here.
  patches:
    - target:
        kind: CustomResourceDefinition
        name: tlsroutes.gateway.networking.k8s.io
      patch: |
        $patch: delete
        apiVersion: apiextensions.k8s.io/v1
        kind: CustomResourceDefinition
        metadata:
          name: tlsroutes.gateway.networking.k8s.io
  prune: true
  sourceRef:
    kind: GitRepository
    name: gateway-api
  wait: true
  interval: 1h
  retryInterval: 1m
  timeout: 5m
---
# yaml-language-server: $schema=https://raw.githubusercontent.com/fluxcd-community/flux2-schemas/main/kustomization-kustomize-v1.json
apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata:
  name: &app gateway-api-gateways
  namespace: flux-system
spec:
  targetNamespace: network
  commonMetadata:
    labels:
      app.kubernetes.io/name: *app
  dependsOn:
    - name: gateway-api-crds
    - name: network-certificates
  path: ./kubernetes/raspberry/network/gateway-api/gateways
  prune: true
  sourceRef:
    kind: GitRepository
    name: flux-system
  wait: true
  interval: 30m
  retryInterval: 1m
  timeout: 5m
