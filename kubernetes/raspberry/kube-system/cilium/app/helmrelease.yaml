---
# yaml-language-server: $schema=https://raw.githubusercontent.com/fluxcd-community/flux2-schemas/main/helmrelease-helm-v2.json
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: &app cilium
  namespace: &namespace kube-system
spec:
  interval: 1h
  chart:
    spec:
      chart: cilium
      version: 1.19.5
      sourceRef:
        kind: HelmRepository
        name: cilium
        namespace: flux-system
  install:
    remediation:
      retries: 3
  upgrade:
    cleanupOnFail: true
    remediation:
      strategy: rollback
      retries: 3
  valuesFrom:
    - kind: Secret
      name: cilium-clustermesh-creds
      valuesKey: peer-cert
      targetPath: clustermesh.config.clusters[0].tls.cert
    - kind: Secret
      name: cilium-clustermesh-creds
      valuesKey: peer-key
      targetPath: clustermesh.config.clusters[0].tls.key
    - kind: Secret
      name: cilium-clustermesh-creds
      valuesKey: peer-ca
      targetPath: clustermesh.config.clusters[0].tls.caCert
  values:
    autoDirectNodeRoutes: true
    bgpControlPlane:
      enabled: true
    bpf:
      masquerade: false
    cluster:
      id: 1
      name: raspberry
    endpointRoutes:
      enabled: true
    envoy:
      enabled: false
    gatewayAPI:
      enabled: true
    hubble:
      enabled: true
      relay:
        enabled: true
        rollOutPods: true
        affinity:
          nodeAffinity:
            preferredDuringSchedulingIgnoredDuringExecution:
              - weight: 100
                preference:
                  matchExpressions:
                    - key: kubernetes.io/hostname
                      operator: In
                      values:
                        - logos
        prometheus:
          serviceMonitor:
            enabled: true
      ui:
        enabled: true
        rollOutPods: true
        affinity:
          nodeAffinity:
            preferredDuringSchedulingIgnoredDuringExecution:
              - weight: 100
                preference:
                  matchExpressions:
                    - key: kubernetes.io/hostname
                      operator: In
                      values:
                        - logos
    ipam:
      mode: kubernetes
    ipv4NativeRoutingCIDR: "10.68.0.0/15"
    k8sServiceHost: 127.0.0.1
    k8sServicePort: 6444
    kubeProxyReplacement: true
    kubeProxyReplacementHealthzBindAddr: 0.0.0.0:10256
    l2announcements:
      enabled: true
    loadBalancer:
      algorithm: maglev
      mode: dsr
    localRedirectPolicy: true
    operator:
      replicas: 1
      rollOutPods: true
      affinity:
        nodeAffinity:
          preferredDuringSchedulingIgnoredDuringExecution:
            - weight: 100
              preference:
                matchExpressions:
                  - key: kubernetes.io/hostname
                    operator: In
                    values:
                      - logos
    clustermesh:
      useAPIServer: true
      enableMCSAPISupport: true
      config:
        enabled: true
        domain: mesh.cilium.io
        clusters:
          - name: turing
            address: turing.mesh.cilium.io
            port: 2379
            ips:
              - 192.168.0.166
      apiserver:
        affinity:
          nodeAffinity:
            preferredDuringSchedulingIgnoredDuringExecution:
              - weight: 100
                preference:
                  matchExpressions:
                    - key: kubernetes.io/hostname
                      operator: In
                      values:
                        - logos
        kvstoremesh:
          enabled: false
        service:
          type: LoadBalancer
          loadBalancerIP: 192.168.0.30
    rollOutCiliumPods: true
    routingMode: native
    securityContext:
      capabilities:
        ciliumAgent:
          - CHOWN
          - KILL
          - NET_ADMIN
          - NET_RAW
          - IPC_LOCK
          - SYS_ADMIN
          - SYS_RESOURCE
          - DAC_OVERRIDE
          - FOWNER
          - SETGID
          - SETUID
        cleanCiliumState:
          - NET_ADMIN
          - SYS_ADMIN
          - SYS_RESOURCE
