---
# yaml-language-server: $schema=https://raw.githubusercontent.com/bjw-s-labs/helm-charts/main/charts/other/app-template/schemas/helmrelease-helm-v2.schema.json
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: &app qbittorrent
  namespace: media
spec:
  interval: 1h
  timeout: 15m
  chartRef:
    kind: OCIRepository
    name: app-template
    namespace: flux-system
  install:
    remediation:
      retries: 3
  upgrade:
    cleanupOnFail: true
    remediation:
      strategy: rollback
      retries: 3
  values:
    controllers:
      qbittorrent:
        pod:
          nodeSelector:
            disktype: ssd
          topologySpreadConstraints:
            - maxSkew: 1
              topologyKey: kubernetes.io/hostname
              whenUnsatisfiable: ScheduleAnyway
              labelSelector:
                matchLabels:
                  app: qbittorrent
          securityContext:
            fsGroup: 2000
            fsGroupChangePolicy: "OnRootMismatch"
          dnsPolicy: "None"
          dnsConfig:
            nameservers:
              - 192.168.0.8
            options:
              - name: ndots
                value: "2"
        containers:
          app:
            nameOverride: *app
            image:
              repository: ghcr.io/home-operations/qbittorrent
              tag: 5.2.0@sha256:788796013c3da75f2dba568c5319975a5c41f555586dfd13987be4631181e00e
            env:
              QBITTORRENT__PORT: &port 8080
              QBITTORRENT__BT_PORT: &bittorrentPort 49437
              TZ: ${TIMEZONE}
              UMASK: "022"
            probes:
              liveness:
                enabled: true
              readiness:
                enabled: true
              startup:
                enabled: true
                spec:
                  failureThreshold: 30
                  periodSeconds: 5
            resources:
              requests:
                cpu: 100m
                memory: 1Gi
              limits:
                cpu: 1
                memory: 4Gi
            securityContext:
              runAsUser: 2000
              runAsGroup: 2000
              runAsNonRoot: true
              allowPrivilegeEscalation: false
              readOnlyRootFilesystem: true
              capabilities:
                drop:
                  - ALL
          gluetun:
            image:
              repository: ghcr.io/qdm12/gluetun
              tag: v3.41.1@sha256:1a5bf4b4820a879cdf8d93d7ef0d2d963af56670c9ebff8981860b6804ebc8ab
            env:
              DNS_ADDRESS: "127.0.0.1"
              DOT: "on"
              DOT_PROVIDERS: "cloudflare"
              FIREWALL_INPUT_PORTS: "8080"
              HEALTH_SUCCESS_WAIT_DURATION: 10s
              HEALTH_VPN_DURATION_ADDITION: 10s
              HEALTH_VPN_DURATION_INITIAL: 30s
              PORT_FORWARD_ONLY: "on"
              SERVER_COUNTRIES: "Sweden"
              VPN_PORT_FORWARDING: "on"
              VPN_PORT_FORWARDING_PROVIDER: "protonvpn"
            envFrom:
              - secretRef:
                  name: qbittorrent-secret
            securityContext:
              capabilities:
                add:
                  - NET_ADMIN
          qbrr:
            image:
              repository: ghcr.io/buroa/qbrr
              tag: latest@sha256:50baeb6633f144b7220777c56a8d501ea708d43043e28eb416d93e4e96efe06b
            env:
              QBITTORRENT_HOST: "http://localhost:8080"
            args:
              - "-max-age"
              - "10000000"
              - "-interval"
              - "300"
              - "-log-level"
              - "info"
            resources:
              requests:
                cpu: 10m
                memory: 32Mi
              limits:
                cpu: 100m
                memory: 128Mi
            securityContext:
              runAsUser: 2000
              runAsGroup: 2000
              runAsNonRoot: true
              allowPrivilegeEscalation: false
              readOnlyRootFilesystem: true
              capabilities:
                drop:
                  - ALL
          port-forward-sync:
            image:
              repository: docker.io/curlimages/curl
              tag: 8.20.0@sha256:b3f1fb2a51d923260350d21b8654bbc607164a987e2f7c84a0ac199a67df812a
            command:
              - /bin/sh
              - -c
              - |
                QBIT_URL="http://localhost:8080"
                PORT_FILE="/tmp/gluetun/forwarded_port"
                LAST_PORT=""
                while true; do
                  if [ -f "$PORT_FILE" ]; then
                    CURRENT_PORT=$(cat "$PORT_FILE")
                    if [ "$CURRENT_PORT" != "$LAST_PORT" ] && [ -n "$CURRENT_PORT" ]; then
                      echo "Port changed from $LAST_PORT to $CURRENT_PORT, updating qBittorrent..."
                      curl -s -X POST "$QBIT_URL/api/v2/app/setPreferences" \
                        -d "json={\"listen_port\":$CURRENT_PORT}"
                      LAST_PORT="$CURRENT_PORT"
                      echo "qBittorrent listen port updated to $CURRENT_PORT"
                    fi
                  fi
                  sleep 30
                done
            resources:
              requests:
                cpu: 10m
                memory: 32Mi
              limits:
                cpu: 200m
                memory: 64Mi
            securityContext:
              runAsUser: 2000
              runAsGroup: 2000
              runAsNonRoot: true
              allowPrivilegeEscalation: false
              readOnlyRootFilesystem: false
              capabilities:
                drop:
                  - ALL
    service:
      app:
        controller: qbittorrent
        ports:
          http:
            port: *port
    ingress:
      app:
        className: internal
        annotations:
          gethomepage.dev/enabled: "true"
          gethomepage.dev/group: Media
          gethomepage.dev/icon: qbittorrent.png
          gethomepage.dev/name: qBittorrent
        hosts:
          - host: &host qbittorrent.${SECRET_DOMAIN}
            paths:
              - path: /
                service:
                  identifier: app
                  port: http
        tls:
          - hosts:
              - *host
    route:
      app:
        enabled: true
        hostnames:
          - *host
        parentRefs:
          - name: internal
            namespace: network
            sectionName: https
        rules:
          - matches:
              - path:
                  type: PathPrefix
                  value: /
            backendRefs:
              - identifier: app
                port: http
    persistence:
      config:
        enabled: true
        type: persistentVolumeClaim
        storageClass: longhorn-single
        accessMode: ReadWriteOnce
        size: 2Gi
        advancedMounts:
          qbittorrent:
            app:
              - path: /config
      downloads:
        enabled: true
        type: nfs
        server: ${NFS_SERVER}
        path: /downloads
        advancedMounts:
          qbittorrent:
            app:
              - path: /media/downloads
      movies:
        enabled: true
        type: nfs
        server: ${NFS_SERVER}
        path: /movies
        advancedMounts:
          qbittorrent:
            app:
              - path: /media/movies
      series:
        enabled: true
        type: nfs
        server: ${NFS_SERVER}
        path: /series
        advancedMounts:
          qbittorrent:
            app:
              - path: /media/series
      tmpfs:
        enabled: true
        type: emptyDir
        advancedMounts:
          qbittorrent:
            app:
              - path: /tmp
      gluetun:
        enabled: true
        type: emptyDir
        advancedMounts:
          qbittorrent:
            gluetun:
              - path: /tmp/gluetun
            port-forward-sync:
              - path: /tmp/gluetun
    defaultPodOptions:
      labels:
        app: qbittorrent
        environment: production
        owner: willianpaixao
