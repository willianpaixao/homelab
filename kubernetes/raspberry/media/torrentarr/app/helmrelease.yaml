---
# yaml-language-server: $schema=https://raw.githubusercontent.com/bjw-s-labs/helm-charts/main/charts/other/app-template/schemas/helmrelease-helm-v2.schema.json
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: &app torrentarr
  namespace: media
spec:
  interval: 1h
  timeout: 15m
  chartRef:
    kind: OCIRepository
    name: app-template
    namespace: flux-system
  install:
    remediation:
      retries: 3
  upgrade:
    cleanupOnFail: true
    remediation:
      strategy: rollback
      retries: 3
  values:
    controllers:
      torrentarr:
        annotations:
          reloader.stakater.com/auto: "true"
        pod:
          nodeSelector:
            disktype: ssd
          securityContext:
            fsGroup: 1000
            fsGroupChangePolicy: OnRootMismatch
            sysctls:
              - name: net.ipv4.ping_group_range
                value: "0 2147483647"
        containers:
          app:
            image:
              repository: feramance/qbitrr
              tag: v5.12.7@sha256:d8e8fb5f8e2555a42ee08a7d1e8b0634198cd9988230b96cb0c87905fffdd029
            env:
              TZ: ${TIMEZONE}
            probes:
              liveness:
                enabled: true
                custom: true
                spec:
                  tcpSocket:
                    port: &port 6969
                  periodSeconds: 30
              readiness:
                enabled: true
                custom: true
                spec:
                  tcpSocket:
                    port: *port
                  periodSeconds: 10
              startup:
                enabled: true
                custom: true
                spec:
                  tcpSocket:
                    port: *port
                  failureThreshold: 60
                  periodSeconds: 10
            resources:
              requests:
                cpu: 50m
                memory: 128Mi
              limits:
                cpu: 1
                memory: 512Mi
            securityContext:
              readOnlyRootFilesystem: false
    service:
      app:
        controller: torrentarr
        ports:
          http:
            port: *port
    route:
      app:
        enabled: true
        annotations:
          gethomepage.dev/enabled: "true"
          gethomepage.dev/group: Media
          gethomepage.dev/icon: torrentarr.png
          gethomepage.dev/name: Torrentarr
        hostnames:
          - torrentarr.${SECRET_DOMAIN}
        parentRefs:
          - name: internal
            namespace: network
            sectionName: https
        rules:
          - matches:
              - path:
                  type: PathPrefix
                  value: /
            backendRefs:
              - identifier: app
                port: http
    persistence:
      config:
        type: persistentVolumeClaim
        storageClass: longhorn-single
        accessMode: ReadWriteOnce
        size: 1Gi
        globalMounts:
          - path: /config
      downloads:
        type: nfs
        server: ${NFS_SERVER}
        path: /downloads
        globalMounts:
          - path: /completed_downloads
      tmp:
        type: emptyDir
        globalMounts:
          - path: /tmp
    defaultPodOptions:
      labels:
        app: torrentarr
        environment: production
        owner: willianpaixao
      dnsConfig:
        options:
          - name: ndots
            value: "1"
