---
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: booklore
  namespace: media
  annotations:
    external-dns.alpha.kubernetes.io/target: "external.${SECRET_DOMAIN}"
    nginx.ingress.kubernetes.io/service-upstream: "true"
spec:
  ingressClassName: external
  rules:
    - host: &host "booklore.${SECRET_DOMAIN}"
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: derived-al2nobhnbj
                port:
                  number: 6060
  tls:
    - hosts:
        - *host
