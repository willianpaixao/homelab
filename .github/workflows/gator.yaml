---
# yaml-language-server: $schema=https://json.schemastore.org/github-workflow.json
name: "OPA Tests"

on:
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.event.number || github.ref }}
  cancel-in-progress: true

jobs:
  opa-tests:
    name: OPA Tests
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: write
    strategy:
      matrix:
        paths: ["kubernetes/raspberry", "kubernetes/turing"]
      max-parallel: 4
      fail-fast: false
    steps:
      - name: Checkout
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6
        with:
          path: pull

      - name: Setup Gator CLI
        run: |
          GATOR_VERSION=v3.18.0
          curl -L -o gator.tar.gz https://github.com/open-policy-agent/gatekeeper/releases/download/${GATOR_VERSION}/gator-${GATOR_VERSION}-linux-amd64.tar.gz
          tar -xzf gator.tar.gz
          chmod +x gator
          sudo mv gator /usr/local/bin/

      - name: Build Flux manifests
        uses: docker://ghcr.io/allenporter/flux-local:v8.2.0@sha256:9c77739d8d7c71b808311693ea52d603d1ddb5190d3d4f23e47f6f33d5254602
        with:
          args: >-
            build helmrelease
            --all-namespaces
            --path /github/workspace/pull/${{ matrix.paths }}/flux-system
            --output /github/workspace/pull/manifests.yaml

      - name: Run Gatekeeper Tests
        working-directory: pull
        run: |
          gator test --filename=kubernetes/policies/ --filename=manifests.yaml > output.txt 2>&1 || true
          cat output.txt

      - uses: mshick/add-pr-comment@8e4927817251f1ff60c001f04568532b38e0b4a0 # v3
        with:
          message-id: "${{ github.event.pull_request.number }}/${{ matrix.paths }}"
          message-failure: OPA Gator CLI failed
          message-path: |
            pull/output.txt
