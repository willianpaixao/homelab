---
# yaml-language-server: $schema=https://json.schemastore.org/github-workflow.json
name: "OPA Tests"

on:
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.event.number || github.ref }}
  cancel-in-progress: true

jobs:
  opa-tests:
    name: OPA Tests
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: write
    strategy:
      matrix:
        paths: ["kubernetes/raspberry", "kubernetes/turing"]
      max-parallel: 4
      fail-fast: false
    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
        with:
          path: pull

      - name: Setup Gator CLI
        run: |
          GATOR_VERSION=v3.18.0
          curl -L -o gator.tar.gz https://github.com/open-policy-agent/gatekeeper/releases/download/${GATOR_VERSION}/gator-${GATOR_VERSION}-linux-amd64.tar.gz
          tar -xzf gator.tar.gz
          chmod +x gator
          sudo mv gator /usr/local/bin/

      - name: Build Flux manifests
        uses: docker://ghcr.io/allenporter/flux-local:v8.4.0@sha256:c0be852e30f299ce6a220cc992b0c21a2a0b0684cc17713b9d718e18d9c8beff
        with:
          args: >-
            build helmrelease
            --all-namespaces
            --path /github/workspace/pull/${{ matrix.paths }}/flux-system
            --output /github/workspace/pull/manifests.yaml

      - name: Run Gatekeeper Tests
        working-directory: pull
        run: |
          gator test --filename=kubernetes/policies/ --filename=manifests.yaml > output.txt 2>&1 || true
          cat output.txt

      - uses: mshick/add-pr-comment@ec328af66588ab8f77cdeb2c264f14aba45bbf59 # v3
        with:
          message-id: "${{ github.event.pull_request.number }}/${{ matrix.paths }}"
          message-failure: OPA Gator CLI failed
          message-path: |
            pull/output.txt
